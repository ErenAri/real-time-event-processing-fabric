global:
  scrape_interval: 5s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: compose-services
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        match_first_network: true
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: ingest-service|stream-processor|query-service|producer-simulator
        action: keep
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: job
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: instance
        replacement: "$1"
